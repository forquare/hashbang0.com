git:
  quiet: true
language: go
go:
- master

addons:
  ssh_known_hosts: hashbang0.com:22222

before_install:
- openssl aes-256-cbc -K $encrypted_7fe7a589c892_key -iv $encrypted_7fe7a589c892_iv -in .deploy/deploy_ed25519.enc -out /tmp/deploy_ed25519 -d
- eval "$(ssh-agent -s)"
- chmod 600 /tmp/deploy_ed25519
- ssh-add /tmp/deploy_ed25519

install:
- export HUGO_DOWNLOAD=0.54.0
- wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_DOWNLOAD}/hugo_${HUGO_DOWNLOAD}_Linux-64bit.tar.gz
- tar xvzf hugo_${HUGO_DOWNLOAD}_Linux-64bit.tar.gz
- mkdir -p $GOPATH/bin
- cp hugo $GOPATH/bin/hugo
- cat .ssh/known_hosts
script: hugo --cleanDestinationDir --enableGitInfo

deploy:
- provider: script
  skip_cleanup: true
  script: rsync -r --delete-after --quiet $TRAVIS_BUILD_DIR/public hashbang_deploy@hashbang0.com:/usr/local/www/hashbang0
  on:
    branch: master
- provider: script
  skip_cleanup: true
  script: rsync -r --delete-after --quiet $TRAVIS_BUILD_DIR/public hashbang_deploy@hashbang0.com:/usr/local/www/test_hashbang0
  on:
    branch: test
- provider: script
  skip_cleanup: true
  script: rsync -r --delete-after --quiet $TRAVIS_BUILD_DIR/public hashbang_deploy@hashbang0.com:/usr/local/www/dev_hashbang0
  on:
    branch: dev
